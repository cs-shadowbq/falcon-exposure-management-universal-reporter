[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "femur-pipeline"
version = "2.0.0"
description = "Streaming data pipeline, transforms, and output sinks for Falcon inventory data"
readme = {text = "Streaming data pipeline, transforms, and output sinks for Falcon inventory data", content-type = "text/plain"}
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "Scott MacGregor" }]

dependencies = ["defusedxml>=0.7.1"]

[project.optional-dependencies]
fast = ["orjson>=3.9.0"]
xml = ["lxml>=5.0.0"]
all = ["orjson>=3.9.0", "lxml>=5.0.0"]
test = ["pytest>=7.4.0", "pytest-cov>=4.1.0", "pytest-mock>=3.12.0"]

[project.urls]
repository = "https://github.com/cs-shadowbq/falcon-exposure-management-universal-reporter"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
