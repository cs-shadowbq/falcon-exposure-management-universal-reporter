[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "femur-server"
version = "2.1.0"
description = "CrowdStrike Falcon exposure management universal reporter — REST API server"
readme = {text = "CrowdStrike Falcon exposure management universal reporter — REST API server", content-type = "text/plain"}
license = { text = "MIT" }
requires-python = ">=3.9"
authors = [{ name = "Scott MacGregor" }]

dependencies = [
    "falcon-exposure-management-universal-reporter>=2.0.0,<3.0.0",
    "femur-pipeline>=2.0.0,<3.0.0",
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
]

[project.optional-dependencies]
test = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
    "httpx>=0.27.0",
]

[project.scripts]
femurd = "femur_server.server.__main__:main"

[project.urls]
repository = "https://github.com/cs-shadowbq/falcon-exposure-management-universal-reporter"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
