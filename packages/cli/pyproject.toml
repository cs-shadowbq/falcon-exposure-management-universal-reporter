[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "femur-cli"
version = "2.1.0"
description = "CrowdStrike Falcon exposure management universal reporter CLI tool"
readme = { text = "CrowdStrike Falcon exposure management universal reporter CLI tool", content-type = "text/plain" }
license = { text = "MIT" }
requires-python = ">=3.9"
authors = [{ name = "Scott MacGregor" }]

dependencies = [
    "falcon-exposure-management-universal-reporter>=2.0.0,<3.0.0",
    "femur-pipeline>=2.0.0,<3.0.0",
    "rich>=14.2.0",
]

[project.optional-dependencies]
fast = ["orjson>=3.9.0"]
xml = ["lxml>=5.0.0"]
all = ["orjson>=3.9.0", "lxml>=5.0.0"]
test = ["pytest>=7.4.0", "pytest-cov>=4.1.0", "pytest-mock>=3.12.0"]

[project.scripts]
femur = "femur_cli.cli:main"

[project.urls]
repository = "https://github.com/cs-shadowbq/falcon-exposure-management-universal-reporter"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
